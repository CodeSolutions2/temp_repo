async function server_to_server_google_login() {

  	// Get service_account_key_id and service_account_email_address from input field
	var service_account_key_id = document.getElementById("service_account_key_id").value;
	// console.log("service_account_key_id :", service_account_key_id);
	
	var service_account_email_address = document.getElementById("service_account_email_address").value;
	// console.log("service_account_email_address :", service_account_email_address);
	
	// Construct header: it is object [with NO dot at end] and btoa ONLY; no space character.
	var header = `{"alg":"RS256","typ":"JWT","kid":"${service_account_key_id}"}`;
	var header_base64encoded =  btoa(header);

	// claim set
	var claim_set = `{"iss":"${service_account_email_address}","scope":"https://www.googleapis.com/auth/prediction","aud":"https://oauth2.googleapis.com/token","exp":1328554385,"iat":1328550785}`;
	var claim_set_base64encoded =  btoa(claim_set);

	// signature
	var signature_str = header+'.'+claim_set;
	var serialized = await serialize_str_to_utf8(signature_str);
	var serialized_base64encoded =  await btoa(serialized);
	
	var JWT = header_base64encoded+'.'+claim_set_base64encoded+'.'+serialized_base64encoded;
}

async function serialize_str_to_utf8(text_str) {
	
	const uint8Array = new TextEncoder().encode(text_str);
	// console.log('uint8Array:', uint8Array);

	// Convert UTF-8 array [non-fixed length array] to a binary arrayBuffer [fixed-length array]
	const arrayBuffer = uint8Array.buffer;
	// console.log("arrayBuffer:", arrayBuffer);
	
	// Convert arrayBuffer [fixed-length array] to UTF-8 array [non-fixed length array]
	return new Uint8Array(arrayBuffer);
}

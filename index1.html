<meta name="google-site-verification" content="Apdt6vK0JUGVeoLTzeJ3tlZbxAYZZLzJMtC7_Q-5NtM" />


<input id="service_account_key_id" type="text" value="" placeholder="service_account_key_id" rows="10" cols="100" style="display:block; text-align: left; width: 600px;">


<button id="run_it" onclick="run_it()" style="display:block;">run_it</button>
	



<script src="https://apis.google.com/js/platform.js?onload=load_client" async defer crossorigin="anonymous"></script>

<script>


	
async function load_client() {
	
	const service_account_key_id_obj = JSON.parse(document.getElementById("service_account_key_id").value);
	var client_id = `${service_account_key_id_obj.client_id}.apps.googleusercontent.com`;

	// ------------------
	
	// A Google Discovery document for REST API services is used to describe the API's endpoints, methods, parameters, and responses in a standardized format. 
	var discovery_document = ["https://storage.googleapis.com/discovery/v1/apis/storage/v1/rest"];
	
	// ------------------

	// var scopes = ["https://www.googleapis.com/auth/cloud-platform", "https://www.googleapis.com/auth/devstorage.full_control", "https://www.googleapis.com/auth/devstorage.read_write"];
	var scopes = "https://www.googleapis.com/auth/cloud-platform";
	
	// ------------------
	
	await gapi.load('auth2', async function() {
		await gapi.auth2.init({ 
			discoveryDocs: discovery_document,
			client_id: client_id,
			scope: scopes
		})
		.then(function () { 

			// Way 0: 
			// Listen for sign-in state changes
			gapi.auth2.getAuthInstance().isSignedIn.listen(updateSigninStatus);
		
			  // Handle the initial sign-in state.
			  updateSigninStatus(gapi.auth2.getAuthInstance().isSignedIn.get());
		
			  authorizeButton.onclick = handleAuthClick;
			  signoutButton.onclick = handleSignoutClick;
			
			// Way 1: get accessToken
			// var auth = gapi.auth2.getAuthInstance();
			// var accessToken = auth.currentUser.get().getAuthResponse().access_token;
		})
	});

}

function updateSigninStatus(isSignedIn) {
        if (isSignedIn) {
          authorizeButton.style.display = 'none';
          signoutButton.style.display = 'block';
          make_REST_API_request();
        } else {
          authorizeButton.style.display = 'block';
          signoutButton.style.display = 'none';
        }
      }

function handleAuthClick(event) {
gapi.auth2.getAuthInstance().signIn();
}

function handleSignoutClick(event) {
gapi.auth2.getAuthInstance().signOut();
}

function make_REST_API_request() {

}
	
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head></head>
<body>

	<canvas id="canvas_img" width="224" height="224" style="display:block"></canvas>

	<button id="solid" onclick="solid()" style="display:block;">solid</button>
	<button id="gradient" onclick="gradient()" style="display:block;">gradient</button>

<style>
canvas {border: 1px solid black; position: absolute; display: inline-block; z-index: 0; top: 150px;}
</style>

	
<script>

var ctx = document.getElementById("canvas_img").getContext("2d");
	var width = 256;
	var height = 256;
document.getElementById("canvas_img").width = width;
document.getElementById("canvas_img").height = height;


async function solid() {
	
	const r = Math.floor(Math.random()*255);
	const g = Math.floor(Math.random()*255);
	const b = Math.floor(Math.random()*255);
	const alpha = Math.floor(Math.random()*100);
	ctx.fillStyle = `rgb(${r} ${g} ${b} / ${alpha}%)`;
	ctx.fillRect(0, 0, width, height);


}
	  

	
async function gradient() {

	// Make a gradient colored background appear on the canvas
	const max_val = 20;

	// ----------------------
	
	// Verify example
	const num_of_squares = 6;
	// OR
	// const num_of_squares = Math.floor(Math.random()*max_val);

	// ----------------------
	
	const val = 255/num_of_squares;
	console.log("val: ", val);

	// ----------------------
		
	for (let i = 0; i < num_of_squares; i++) {
		for (let j = 0; j < num_of_squares; j++) {
			let r = Math.floor(255 - val * i);
			let g = Math.floor(255 - val * j);

			// let k = Math.floor(Math.random()*(num_of_squares-1));
			// let b = Math.floor(255 - val * k);
			// OR
			let b = 0;
			ctx.fillStyle = `rgb(${r} ${g} ${b} / 75%)`;

			// idea 0 - not sure why 25
			// ctx.fillRect(j * 25, i * 25, 25, 25);
				
			// idea 1 - it should be val to fill the space of the canvas
			ctx.fillRect(j * val, i * val, val, val);
		}
	}

}


	
</script>
</body>
</html>

async function convert_TFtensor_to_JSarray(tensor) {
  return tensor.arraySync();
}

// -----------------------------------------------
  
async function recur_func(arr) {
  if (arr != undefined) {
return [arr[0], arr.length];
} else {
return arr;
}
}

async function shape(arr) {
var out = await recur_func(arr);
var shap = [out[1]];
var c = 0; // typically work with 4D arrays or less
while (out != undefined && c < 4) {
out = await recur_func(out[0]);
if (out != undefined) {
shap.push(out[1]);
}
c = c + 1;
}

if (shap.length > 1) {
shap = shap.slice(0, shap.length-1);
}

return shap;
}

  async function fetch_image_CORS() {

    var url = document.getElementById("url").value;

    // Determine request method
	var headers = {
		"Content-Type": "application/json",
		"Referer": url,
		"Origin": "https://codesolutions2.github.io",
		"Connection": "keep-alive",
		"User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:120.0) Gecko/20100101 Firefox/120.0",
		"Access-Control-Allow-Origin": "*"
	};
	
	var options = { 
		method : "GET",
		mode: 'cors',
		headers: new Headers(headers),
		cache: "no-cache",
		crossorigin: 'anonymous',
		redirect: "follow"
	};

    
// ---------------------
  
    var blob_object = await fetch(url, options)
		.then(response => response.blob())
		.then(function(blob_object) {
      console.log("blob_object: ", blob_object);
      return blob_object;
		})
		.catch(error => console.error("error: ", error));

// ---------------------
    
    const blobURL = URL.createObjectURL(blob_object);

    // Create an image element and set its source to the Blob URL
    const imageElement = new Image();
    imageElement.onload = function() {
      ctx.drawImage(imageElement, 0, 0, canvasElement.width, canvasElement.height);
    };
    imageElement.src = blobUrl;

    // ---------------------
    
}

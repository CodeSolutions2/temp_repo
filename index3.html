<!DOCTYPE html>
<html>
<head></head>
<body>

<input id="service_account_key_id" type="text" value="" placeholder="service_account_key_id" rows="10" cols="100" style="display:block; text-align: left; width: 600px;">

<button id="obtain_GCP_authorization_REST_API_way4" onclick="obtain_GCP_authorization_REST_API_way4()">obtain_GCP_authorization_REST_API_way4</button>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>


<!-- (Library 0: GAPI) Google Identity [Old library] -->
<script src="https://apis.google.com/js/platform.js?onload=obtain_GCP_authorization_REST_API_way1" async defer crossorigin="anonymous"></script>


<script>

async function obtain_GCP_authorization_REST_API_way4() {

	// JavaScript, Service Account
  
	const service_account_key_id_obj = JSON.parse(document.getElementById("service_account_key_id").value);
	const SERVICE_ACCOUNT_EMAIL = `${service_account_key_id_obj.client_email}`;
  
	const url = `https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${SERVICE_ACCOUNT_EMAIL}:generateAccessToken`;
	  
	const method = '¨POST';
	  
	const data = {
	    "scope": ["https://www.googleapis.com/auth/cloud-platform"],
	};
	
	var headers_additional = {};
	headers_additional["Content-Type"] = "application/json";
	// headers_additional["Content-Type"] = "application/x-www-form-urlencoded";
	// headers_additional["Authorization"] = "Bearer " + authorization_code;
	  
	var response = await call_fetch_methods(url, method, data, headers_additional);
	console.log('response: ', window.bota(response.slice(0,5)));
}






// -----------------------------------------------
// SUBFUNCTIONS
// -----------------------------------------------
async function call_fetch_methods(url, method, data, headers_additional) {
	
	const CORS_method_list = ['jQuery_CORS', 'fetch_CORS'];
  
	var response = undefined;
	// response = undefined means that blob_object = null
	// response = {} is not blob_object = null

	for (var i=0; i<CORS_method_list.length; i++) {
		try {
			response = await run_fetch_method(url, method, data, CORS_method_list.at(i), headers_additional);
			console.log('response: ', response);
		} catch (error) {
			console.log('error: ', error);
		}
    
		if (response != undefined) {
			break;
		}
	}
}

// -----------------------------------------------

async function run_fetch_method(url, method, data, fetch_method, headers_additional) {
		
	var headers = {
		"Referer": url,
		"Origin": "https://codesolutions2.github.io",
		"Connection": "keep-alive",
		//"Sec-Fetch-Dest": "empty",
		//"Sec-Fetch-Mode": "cors", 
		//"Sec-Fetch-Site": "cross-site",
		//"Sec-Fetch-User": "?1",
		"User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:120.0) Gecko/20100101 Firefox/120.0",
		"Access-Control-Allow-Origin": "*",
		//'Access-Control-Allow-Credentials': false, 
		//"Access-Control-Request-Method": method,
		//"Access-Control-Request-Headers": 'content-type,x-pingother',
		//'Cache-Control': 'max-age=0',
	};

	headers = Object.assign({}, headers, headers_additional);

	// -------------------------------------
  
	if (fetch_method == "fetch_CORS") {
		
		var options = { 
			method : method,
			mode: 'cors',
			headers: new Headers(headers),
			cache: "no-cache",
			// crossorigin: 'anonymous',
			crossorigin: '*',
			redirect: "follow"
		};
		
		if (method == 'POST') {
			options.body = JSON.stringify(data);
		}
		
		return await fetch(url, options)
			.then(res => res.json())
			.then(async function(data) { return JSON.parse(JSON.stringify(data)); })
			.catch(error => console.error("error: ", error));

	} else {
		
		// jQuery_CORS
    
		var settings = {
			type : method,
			xhrFields: {responseType: 'json'},
			dataType: 'json',
			async: true,
			crossDomain: true,
			beforeSend: function(xhr) {xhr.withCredentials = true;},
			// headers: new Headers(headers),
			success: function(response) { console.log('Success'); },
			error: function(xhr, status, error) { console.log('Error:', error); }
		};
		
		if (method == 'POST') {
			settings.body = JSON.stringify(data);
		}
		
		return await $.ajax(url, [,settings]).done(function(response) { return response; });
	}
    
}

// -----------------------------------------------

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head></head>
<body>


<input id="API_KEY" type="text" value="" placeholder="API_KEY" rows="10" cols="100" style="display:block; text-align: left; width: 600px;">


<button onclick="authenticate().then(loadClient)">authorize and load</button>


<!-- (Library 0: GAPI) Google Identity [Old library] -->
<script src="https://apis.google.com/js/platform.js?onload=obtain_GCP_authorization_REST_API_way1" async defer crossorigin="anonymous"></script>

  
<script>


function authenticate() {
	return gapi.auth2.getAuthInstance()
		.signIn({scope: "https://www.googleapis.com/auth/cloud-platform"})
		.then(function() { console.log("Sign-in successful"); }, function(err) { console.error("Error signing in", err); });
}


	
function loadClient() {

  const API_KEY = document.getElementById("API_KEY").value;
  
	gapi.client.setApiKey(API_KEY);
	
	return gapi.client.load("https://iamcredentials.googleapis.com/$discovery/rest?version=v1")
        .then(function() { console.log("GAPI client loaded for API"); },
              function(err) { console.error("Error loading GAPI client for API", err); });
}
  
</script>
</body>
</html>

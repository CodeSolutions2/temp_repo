<!DOCTYPE html>
<html>
<head></head>
    
<body>
  
<button id="load_a_script_in_JavaScript" onclick="load_a_script_in_JavaScript()" style="display:block">load_a_script_in_JavaScript</button>

	
<script>

// -------------------------------------------------
  
async function load_a_script_in_JavaScript() {

	await loadScript()
		.then( data  => { console.log("Script loaded successfully", data); })
		.catch( err => { console.error(err); });

	// Test a function in the imported script
	var out = async () => { return await rand_perm([2, 4, 5]); }
	console.log('out: ', out);
}

// -------------------------------------------------

async function loadScript() {
	
	return new Promise((resolve, reject) => {
	        try {
	            const scriptElement = document.createElement("script");
	            scriptElement.type = "module";  // "text/javascript"
	            scriptElement.async = true;
	            scriptElement.src = "https://cdn.jsdelivr.net/npm/library_to_run_github_actions@1.0.1/dist/library_to_run_GitHub_Actions.js";
	            scriptElement.crossorigin = "*";
	            scriptElement.redirect = "follow";
	            scriptElement.mode = 'cors';
			
	            scriptElement.addEventListener("load", (ev) => {
	                resolve({ status: true });
	            });
	
	            scriptElement.addEventListener("error", (ev) => {
	                reject({
	                    status: false,
	                    message: `Failed to load the script ${FILE_URL}`
	                });
	            });
	
	            document.body.appendChild(scriptElement);
	        } catch (error) {
	            reject(error);
	        }
	});
}

// -------------------------------------------------

	
	
</script>
</body>
</html>

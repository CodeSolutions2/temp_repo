async function solid() {
	
	const r = Math.floor(Math.random()*255);
	const g = Math.floor(Math.random()*255);
	const b = Math.floor(Math.random()*255);
	const alpha = Math.floor(Math.random()*100);
	ctx.fillStyle = `rgb(${r} ${g} ${b} / ${alpha}%)`;
	ctx.fillRect(0, 0, width, height);


}
	  

	
async function gradient() {

	// Make a gradient colored background appear on the canvas
	const max_val = 20;

	// ----------------------
	
	// This changes the width of the square
	const num_of_squares = Math.floor(Math.random()*max_val);

	// ----------------------
	
	const val = 255/num_of_squares;
	console.log("val: ", val);

	// ----------------------

	const color_selection = Math.floor(Math.random() * 7);
	console.log("color_selection: ", color_selection);
	
	// ----------------------
		
	for (let i = 0; i < num_of_squares; i++) {
		for (let j = 0; j < num_of_squares; j++) {

			var r;
			var g;
			var b;
			
			if ( color_selection == 0 ) {
				// rainbow colors
				r = Math.floor(255 - val * i);
				g = Math.floor(255 - val * j);
				let k = Math.floor(Math.random()*(num_of_squares-1)); // maintains gradient for square size when Math.random()=1
				b = Math.floor(255 - val * k);
				
			} else if ( color_selection == 1 ) {
				// red and green only
				r = Math.floor(255 - val * i);
				g = Math.floor(255 - val * j);
				b = 0;

			} else if ( color_selection == 2 ) {
				// green and red only
				g = Math.floor(255 - val * i);
				r = Math.floor(255 - val * j);
				b = 0; 

			} else if ( color_selection == 3 ) {
				// red and blue only
				r = Math.floor(255 - val * i);
				b = Math.floor(255 - val * j);
				g = 0;

			} else if ( color_selection == 4 ) {
				// blue and red only
				b = Math.floor(255 - val * i);
				r = Math.floor(255 - val * j);
				g = 0;

			} else if ( color_selection == 5 ) {
				// blue and green only
			 	b = Math.floor(255 - val * i);
				g = Math.floor(255 - val * j);
				r = 0;

			} else {
				// green and blue only
				g = Math.floor(255 - val * i);
				b = Math.floor(255 - val * j);
				r = 0;
			}
			
			ctx.fillStyle = `rgb(${r} ${g} ${b} / 75%)`;
			
			ctx.fillRect(j * val, i * val, val, val);
		}
	}

}



async function evaluate_average_image_color() {
	
	// Display something on an image
	await gradient();
	
	// Get canvas image
	const uint8ClampedArray = await ctx.getImageData(0, 0, width, height); // TypedArray  Uint8ClampedArray
	console.log('uint8ClampedArray: ', uint8ClampedArray);
  
	// Convert TypedArray to normalArray
	const normalArray = await Array.from(uint8ClampedArray.data);  // did not work, maybe it only works for uint8Array
	console.log('normalArray: ', normalArray);
	
	// OR

	// var normalArray1 = Array.prototype.slice.call(uint8ClampedArray.data)
	// console.log('normalArray1: ', normalArray1);
	
	// ----------------------
  
	// Determine the length of the normalArray.length
	console.log('normalArray.length: ', normalArray.length);

	// If image is stacked as 256*256*3, where 3 represents r, g, b
	console.log('rgb_stacking expected length: ', width*height*3);

	// ----------------------
  
	// Verify that image color range is correct: determine the maximum and minimum value
	const normalArray_sorted = normalArray.sort();
  
	const min_val = normalArray_sorted.at(0);
	console.log('min_val: ', min_val);  // needs to be 0
  
	const max_val = normalArray_sorted.at(normalArray_sorted.length-1);
	console.log('max_val: ', max_val);  // needs to be 255

	// ----------------------

	// Extract the rgb layers of the image
	// Unpack r,g,b: Image is 256*256*3

	var img = {};
	const color_name = ['r', 'g', 'b', 'alpha'];
	var avg_rbgalpha = [];
  
	for (let i=0; i<color_name.length; i++) {
		var start = i;
		var ender = start + height*width;
		var r_g_b_alpha_layer_arr = normalArray.slice(start, ender); // row is a r, g, or b layer

		// Calculate average per r, g, b layer
		var out = await avg(r_g_b_alpha_layer_arr); 
		avg_rbgalpha.push(out);
	    
		// ----------------------
	    
		// Fold 1D layer into a 2D layer
		var layer = [];
		for (let j=0; j<r_g_b_alpha_layer_arr.length; j++) {
			var st = j;
			var en = st + width;
			layer.push(r_g_b_alpha_layer_arr.slice(st, en))
		}
		img[color_name.at(i)] = layer;
	
		// ----------------------
	}
	console.log('img: ', img);
	
	

	// Draw one of the layers of the image data onto the canvas

	// Concatenate to make all channels the same - or do I make them zero?
	var full_array = img[color_name.at(0)]; // r
	// cycle 3 times for [g, b, alpha]
	for (let i=0; i<3; i++) {
		full_array = full_array.concat(img[color_name.at(0)]);
	}

	const r_typedarray = new Uint8ClampedArray(full_array);
	console.log('r_typedarray: ', r_typedarray);
	
	let imageData = new ImageData(r_typedarray, width, height);

	document.getElementById("canvas_img_onechannel").style.left = Number(1*width + 40).toString() + 'px';
	ctx1.putImageData(imageData, 0, 0);
}


async function avg(arr) {
  const sum = arr.reduce((accumulator, currentValue) => accumulator + currentValue, 0);
  return sum/arr.length;
}

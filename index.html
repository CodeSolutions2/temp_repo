<body>


<input id="PROJECT_ID" type="text" value="" placeholder="PROJECT_ID" rows="10" cols="100" style="display:block; text-align: left; width: 600px;">

<input id="API_TOKEN" type="text" value="" placeholder="API_TOKEN" rows="10" cols="100" style="display:block; text-align: left; width: 600px;">

<button id="obtain_GCP_authorization_REST_API_way0" onclick="obtain_GCP_authorization_REST_API_way0()">obtain_GCP_authorization_REST_API_way0</button>

  
<script>

async function obtain_GCP_authorization_REST_API_way0() {

	// JavaScript, Bash

	// Authorize using an API_TOKEN using a bash command. 
	
  	// https://cloud.google.com/docs/authentication/rest

	// -------------------------------------
	
	// Name of Google Cloud Platform Project ID
	var url = `https://cloudresourcemanager.googleapis.com/v3/projects/${document.getElementById("PROJECT_ID").value}`;

	// -------------------------------------
	
	const method = "GET";
	const data = {};

	var headers_additional = {};
	headers_additional["Content-Type"] = "application/json";  // "application/x-www-form-urlencoded"
	headers_additional.Authorization = 'Bearer ' + document.getElementById("API_TOKEN").value;

	var response = await call_fetch_methods(url, method, data, headers_additional);
	console.log('response: ', response);

	// returns details for the specified project
	// -------------------------------------
	
	// return response;

}
</script>

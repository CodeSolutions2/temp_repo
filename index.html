<!DOCTYPE html>
<html>
<head></head>
    
<body>

<input type="text" name="" id="url" value="" placeholder="url" style="display:block; width: 600px;">
  
<button id="run_fetch_script" onclick="run_fetch_script()" style="display:block">run_fetch_script</button>
  
<script>

// -------------------------------------------------
  
async function run_fetch_script() {

	await loadScript()
		.then( data  => { console.log("Script loaded successfully", data); })
		.catch( err => { console.error(err); });

	// Test a function in the imported script
	var out = async () => { await rand_perm([2, 4, 5]); }
	console.log('out: ', out);
}

// -------------------------------------------------

async function loadScript() {
	
	return new Promise((resolve, reject) => {
	        try {
	            const scriptElement = document.createElement("script");
	            scriptElement.type = "module";  // "text/javascript"
	            scriptElement.async = true;
	            scriptElement.src = document.getElementById('url').value;
	            scriptElement.crossorigin = "*";
	            scriptElement.redirect = "follow";
	            scriptElement.mode = 'cors';
	
	            scriptElement.addEventListener("load", (ev) => {
	                resolve({ status: true });
	            });
	
	            scriptElement.addEventListener("error", (ev) => {
	                reject({
	                    status: false,
	                    message: `Failed to load the script ${FILE_URL}`
	                });
	            });
	
	            document.body.appendChild(scriptElement);
	        } catch (error) {
	            reject(error);
	        }
	});
}

// -------------------------------------------------

	
	
</script>
</body>
</html>

async function gradient() {

	// Make a gradient colored background appear on the canvas
	const max_val = 20;

	// ----------------------
	
	// This changes the width of the square
	const num_of_squares = Math.floor(Math.random()*max_val);

	// ----------------------
	
	const val = 255/num_of_squares;
	console.log("val: ", val);

	// ----------------------

	const color_selection = Math.floor(Math.random() * 7);
	console.log("color_selection: ", color_selection);
	
	// ----------------------
		
	for (let i = 0; i < num_of_squares; i++) {
		for (let j = 0; j < num_of_squares; j++) {

			var r;
			var g;
			var b;
			
			if ( color_selection == 0 ) {
				// rainbow colors
				r = Math.floor(255 - val * i);
				g = Math.floor(255 - val * j);
				let k = Math.floor(Math.random()*(num_of_squares-1)); // maintains gradient for square size when Math.random()=1
				b = Math.floor(255 - val * k);
				
			} else if ( color_selection == 1 ) {
				// red and green only
				r = Math.floor(255 - val * i);
				g = Math.floor(255 - val * j);
				b = 0;

			} else if ( color_selection == 2 ) {
				// green and red only
				g = Math.floor(255 - val * i);
				r = Math.floor(255 - val * j);
				b = 0; 

			} else if ( color_selection == 3 ) {
				// red and blue only
				r = Math.floor(255 - val * i);
				b = Math.floor(255 - val * j);
				g = 0;

			} else if ( color_selection == 4 ) {
				// blue and red only
				b = Math.floor(255 - val * i);
				r = Math.floor(255 - val * j);
				g = 0;

			} else if ( color_selection == 5 ) {
				// blue and green only
			 	b = Math.floor(255 - val * i);
				g = Math.floor(255 - val * j);
				r = 0;

			} else {
				// green and blue only
				g = Math.floor(255 - val * i);
				b = Math.floor(255 - val * j);
				r = 0;
			}
			
			ctx.fillStyle = `rgb(${r} ${g} ${b} / 75%)`;
			
			ctx.fillRect(j * val, i * val, val, val);
		}
	}

}

	console.log('normalArray.length: ', normalArray.length);

	console.log('rgb_stacking expected length: ', width*height*4);

	var avg_val = await avg(normalArray);

	// Extract the rgb layers of the image
	// Unpack r,g,b,alpha: Image is 256*256*4
	
	const color_name = ['r', 'g', 'b', 'alpha'];
	
	var r_arr = [];
	var g_arr = [];
	var b_arr = [];
	var alpha_arr = [];
	
	for ( let i=0; i<normalArray.length; i+=color_name.length ) {
		
		// r, g, b, alpha layers are interleaved 
		r_arr.push(normalArray[i]);
		g_arr.push(normalArray[i+1]);
		b_arr.push(normalArray[i+2]);
		alpha_arr.push(normalArray[i+3]);
	}

	// OR

	// for (let i = 0; i < width * height; i++) {
	//      r_arr.push(normalArray[i * color_name.length]);
	//      g_arr.push([i * color_name.length + 1]);
	//      b_arr.push([i * color_name.length + 2]);
	//      alpha_arr.push([i * color_name.length + 3]);
	// }
	

	// Calculate average per r, g, b layer
	var r_avg = await avg(r_arr);
	var g_avg = await avg(g_arr);
	var b_avg = await avg(b_arr);
	var alpha_avg = await avg(alpha_arr);
	console.log('avg_rbgalpha: ', [r_avg, g_avg, b_avg, alpha_avg]);

	const g_arr_stand =  g_arr.map((val, ind) => { return (val - avg_val) / g_std; });
	const b_arr_stand =  b_arr.map((val, ind) => { return (val - avg_val) / b_std; });
	console.log('r_arr_stand: ', r_arr_stand);
	console.log('g_arr_stand: ', g_arr_stand);
	console.log('b_arr_stand: ', b_arr_stand);
	
	var r_stand_avg = await avg(r_arr_stand);
	var g_stand_avg = await avg(g_arr_stand);
	var b_stand_avg = await avg(b_arr_stand);
	console.log('r_stand_avg: ', r_stand_avg);
	console.log('g_stand_avg: ', g_stand_avg);
	console.log('b_stand_avg: ', b_stand_avg);
		
	// ----------------------

	// Alpha component, set to 255 to make the colors fully opaque

	// ----------------------

	// Interleave them back

	// Way 0: slow computation
	// var full_arr_only_r = [];
	// var full_arr_only_g = [];
	// var full_arr_only_b = [];
	// let count = 0;
	// for ( let i=0; i<normalArray.length; i+=color_name.length ) {
	// 	full_arr_only_r = full_arr_only_r.concat([r_arr[count], 0, 0, 255]);
	// 	full_arr_only_g = full_arr_only_g.concat([0, g_arr[count], 0, 255]);
	// 	full_arr_only_b = full_arr_only_b.concat([0, 0, b_arr[count], 255])
	// 	count = count + 1;
	// }

	var full_arr_only_g = Array.from({ length: normalArray.length }, (_, i) => 0);

async function avg(arr) {
  const sum = arr.reduce((accumulator, currentValue) => accumulator + currentValue, 0);
  return sum/arr.length;
}

// -----------------------------------------------

async function std(arr) {
	const mu =  await avg(arr);
	// console.log('mu: ', mu);

	var arr1 = arr.map((x) => { return x-mu; });
	const summ = await arr1.reduce((accumulator, currentValue) => accumulator + currentValue, 0);
	// console.log('summ: ', summ);

	const out = Math.sqrt( Math.pow(summ, 2)/arr.length );
	// console.log('out: ', out);
	
	return out;
}

async function contrast_color() { 

	// Take the inverse of the r_avg, g_avg, b_avg on a color circle.

	[r_avg, g_avg, b_avg, alpha_avg] = await evaluate_average_image_color();

	// each r_avg, g_avg, b_avg has an x an y component on a circle.
	
	// -------------------------------------------
	
	// Way 0: numerical way

	// Specify the number of mapping samples
	const num_of_samples = 100;
	
	// [0] Make mapping of all possible theta values (theta on a circle is from 0 to 2*pi)
	const max_value = 2*Math.PI;
	const increment = max_value/num_of_samples;
	const theta = Array.from({ length: num_of_samples }, (_, i) => i*increment);
	// console.log("theta: ", theta)
	
	// -------------------------------------------
	
	// red=255 is at pi/2, so generate a sequence from 0 to 255 where the index of theta=pi/2 is equal to red=255
	// find the index
	const desired_index_r = await find_index_for_closest_array_value(theta, Math.PI/2);
	// desired_index is in the range of 0 to 255
	
	const red = Array.from({ length: 256 }, (_, i) => i);
	
	// shift entries of red to the left by shift_index
	const shift_index_r = 255 - desired_index_r; // since desired_index is in the range from 0-255, subtract 255 (not 256)
	const red_circular_shifted = await circular_shift_to_left(red, shift_index_r);
	
	// -------------------------------------------

	// green=255 is at 0, so generate a sequence from 0 to 255 where the index of theta=0 is equal to green=255
	// find the index
	const desired_index_g = await find_index_for_closest_array_value(theta, 0);
	// desired_index is in the range of 0 to 255
	
	const green = Array.from({ length: 256 }, (_, i) => i);
	
	// shift entries of red to the left by shift_index
	const shift_index_g = 255 - desired_index_g; // since desired_index is in the range from 0-255, subtract 255 (not 256)
	const green_circular_shifted = await circular_shift_to_left(green, shift_index_g);
	
	// -------------------------------------------

	// blue=255 is at 3*pi/4, so generate a sequence from 0 to 255 where the index of theta=3*pi/4 is equal to blue=255
	// find the index
	const desired_index_b = await find_index_for_closest_array_value(theta, (3/4)*Math.PI);
	// desired_index is in the range of 0 to 255
	
	const blue = Array.from({ length: 256 }, (_, i) => i);
	
	// shift entries of red to the left by shift_index
	const shift_index_b = 255 - desired_index_b; // since desired_index is in the range from 0-255, subtract 255 (not 256)
	const blue_circular_shifted = await circular_shift_to_left(blue, shift_index_b);
	
	// -------------------------------------------

	// The red, green, blue arrays are aligned with theta correctly, with respect to a color picker circle mapping.
	
	// -------------------------------------------
	
	// find the opposite r, g, b color (meaning find the index of r, g, b for r_avg, g_avg, and b_avg values that are M)

	// find the index in red_circular_shifted for r_avg
	const desired_index_r_avg = await find_index_for_closest_array_value(red_circular_shifted, r_avg);

	// find corresponding theta index
	const theta_at_r_avg = theta.at(desired_index_r_avg);

	// add Math.PI to get opposite theta value
	var theta_at_r_avg_opposite = theta_at_r_avg + Math.PI;

	// Normalize from 0 to 2*Math.PI
	if ( theta_at_r_avg_opposite > 2*Math.PI ) {
		theta_at_r_avg_opposite = theta_at_r_avg_opposite / (2*Math.PI);
	}

	// Find index of the theta opposite value in theta
	const desired_index_theta_opposite_r = await find_index_for_closest_array_value(theta, theta_at_r_avg_opposite);
	
	// Find the index of red_circular_shifted
	const R_contrast = red_circular_shifted.at(desired_index_theta_opposite_r);
	
	// -------------------------------------------

	// find the index in green_circular_shifted for g_avg
	const desired_index_g_avg = await find_index_for_closest_array_value(green_circular_shifted, g_avg);

	// find corresponding theta index
	const theta_at_g_avg = theta.at(desired_index_g_avg);

	// add Math.PI to get opposite theta value
	var theta_at_g_avg_opposite = theta_at_g_avg + Math.PI;

	// Normalize from 0 to 2*Math.PI
	if ( theta_at_g_avg_opposite > 2*Math.PI ) {
		theta_at_g_avg_opposite = theta_at_g_avg_opposite / (2*Math.PI);
	}

	// Find index of the theta opposite value in theta
	const desired_index_theta_opposite_g = await find_index_for_closest_array_value(theta, theta_at_g_avg_opposite);
	
	// Find the index of green_circular_shifted
	const G_contrast = green_circular_shifted.at(desired_index_theta_opposite_g);
	
	// -------------------------------------------

	// find the index in blue_circular_shifted for b_avg
	const desired_index_b_avg = await find_index_for_closest_array_value(blue_circular_shifted, b_avg);

	// find corresponding theta index
	const theta_at_b_avg = theta.at(desired_index_b_avg);

	// add Math.PI to get opposite theta value
	var theta_at_b_avg_opposite = theta_at_b_avg + Math.PI;

	// Normalize from 0 to 2*Math.PI
	if ( theta_at_b_avg_opposite > 2*Math.PI ) {
		theta_at_b_avg_opposite = theta_at_b_avg_opposite / (2*Math.PI);
	}

	// Find index of the theta opposite value in theta
	const desired_index_theta_opposite_b = await find_index_for_closest_array_value(theta, theta_at_b_avg_opposite);
	
	// Find the index of blue_circular_shifted
	const B_contrast = blue_circular_shifted.at(desired_index_theta_opposite_b);
	
	// -------------------------------------------

	return [R_contrast, G_contrast, B_contrast];
}

async function find_index_for_closest_array_value(arr, desired_array_value) {

	// Find the index for the desired theta alignment value
	var closest_val = 99999999; // initialization value; a largest value
	var index = 0;
	arr.map((val, ind) => { 
	    if ( closest_val > Math.abs( val- desired_array_value ) ) {
	        closest_val = Math.abs( val- desired_array_value );
	        index = ind;
	    }
	    return "";
	});
	
	console.log("index: ", index)
	return index;
}

function circular_shift_to_left(arr, shift_index) {
    var left = arr.slice(0, shift_index);
    console.log("left: ", left)
    
    var right = arr.slice(shift_index, arr.length);
    console.log("right: ", right)
    
    var circular_shift_arr = right.concat(left);
    
    console.log("circular_shift_arr: ", circular_shift_arr);
    return circular_shift_arr;
}

// -----------------------------------------------

function circular_shift_arr_to_right(arr, shift_index) {
	
	var left = arr.slice(0, arr.length-shift_index);
	console.log("left: ", left)
    
	var right = arr.slice(arr.length-shift_index, arr.length);
	console.log("right: ", right)
    
	var circular_shift_arr = right.concat(left);
    
	console.log("circular_shift_arr: ", circular_shift_arr);
	return circular_shift_arr;
}

async function resize(width_NEW, height_NEW) {

	// Use src, resize canvas, make new image

	// [0] get copy of original canvas image
	var url = canvasElement.toDataURL('image/png');  // WORKS
	console.log('url: ', url);
		
	// [1] define resizing parameters
	var sx = 0; // for cropping the image: distance from the [original left edge of the image] to the [deisred left edge of image]
	var sy = 0; // for cropping the image: distance from the [original top edge of the image] to the [deisred top edge of image]
	var image_width = width_ORG; // width_NEW; // for cropping the image: desired image width
	var image_height = height_ORG; // height_NEW; // for cropping the image: desired image height
	var dx = 0;  // location to place image on canvas: distance from the [left edge of the canvas] to the [left edge of image]
	var dy = 0;  // location to place image on canvas: distance from the [top edge of the canvas] to the [top edge of image]
	var dWidth = width_NEW; // for resizing the image on the canvas: desired image width on canvas
	var dHeight = height_NEW; // for resizing the image on the canvas: desired image width on canvas

	const imageElement = new Image();
	imageElement.crossOrigin = "anonymous";
	imageElement.onload = async () => {

		// [2] resize canvas
		canvasElement.width = width_NEW;
		canvasElement.height = height_NEW;

		// [3] put the image back onto the canvas at the new size using image.src and defining the new size
		ctx.drawImage(imageElement, sx, sy, image_width, image_height, dx, dy, dWidth, dHeight); // only imageElement, sx, sy, image_width, image_height need to be set
	};
	imageElement.src = url;
	
}

async function convert_canvas_into_ImageData(ctx, canvasElement) {
	
	// Get canvas image
	const uint8ClampedArray = await ctx.getImageData(0, 0, canvasElement.width, canvasElement.height); // TypedArray  Uint8ClampedArray
	// console.log('uint8ClampedArray: ', uint8ClampedArray);
  
	// Convert TypedArray to normalArray
	return await Array.from(uint8ClampedArray.data);
}

async function create_dynamic_canvasElement(width, height, canvasElement_id, canvasElement_className, canvas_number=0) {
  
	// Create a canvas element
	var canvasElement = document.createElement('canvas');

	// Set attributes of the canvas
	canvasElement.width = width;
	canvasElement.height = height;
  	canvasElement.id = canvasElement_id;
	canvasElement.class = canvasElement_className;
	
	// Get the 2D rendering context of the canvas
	var ctx = canvasElement.getContext("2d");

	// -------------------------

	// (Optional) Parameter to put canvas next to each other
	if (canvas_number == 0) {
		canvasElement.style.left = 40+'px';
	} else {
		// Append a canvas to the right of an existing canvas
		let tot = canvas_number*canvasElement.width + 40;
		canvasElement.style.left = tot+'px';
	}

	// -------------------------

	// Make a canvas border
	canvasElement.style.border = '1px solid black';

	return [ctx, canvasElement];
}

				ctx.fillRect(0, 0, 224, 50);  // fillRect(x, y, width, height)

				// Write on top of the overlay the prediction name
				ctx.fillStyle = "#ffffff";  // Font color = white
				ctx.fillText("Mobilenet= "+predictions[0].className, 10, 15); // fillText(text, x, y [, maxWidth])
				
				// Store model predictions in array
				const mobilenet_predictionName = predictions[0].className;
				console.log("mobilenet_predictionName: ", mobilenet_predictionName);
				
				const mobilenet_prediction_probability = predictions[0].probability;
				console.log("mobilenet_prediction_probability: ", mobilenet_prediction_probability);
			})
		});

}

	};

	// Way 1

	const normalArray_normalized_way1 = normalArray_normalized_tf.arraySync();
	console.log('Verify normalArray max min way1: ', [normalArray_normalized_way1.sort().shift(), normalArray_normalized_way1.sort().pop()]);  //  gave values from 0 to 1

async function convert_textStr_to_utf8Array_way1(text_str) {

	// Way 1
	// Transform text_str into Typed array.
	var character_array = text_str.split('');
	console.log("character_array: ", character_array);
	// Array(38190) [ "�", "�", "�", "d", "\u0000", "\u0000", "\u0000", "\u0000", "\u0000", "\u0000", … ]
	// length = 349528
			
	// Map each [binary string character; a subset of binary string characters is UTF-8] as an [ASCII number; a number from 0 to number_of_characters]
	var byteArray = character_array.map((character) => { return character.charCodeAt(0); });
	console.log("byteArray: ", byteArray);
	
	// The importance of this mapping is to limit the array values from 0 to 255.
	const uint8Array_nonfixedLength_way1 = await new Uint8Array(byteArray);
	console.log('uint8Array_nonfixedLength_way1: ', uint8Array_nonfixedLength_way1);

	return uint8Array_nonfixedLength_way1;
}

// -------------------------------------------------

async function convert_utf8Array_to_arrayBuffer(uint8Array_nonfixedLength) {

	// Convert UTF-8 array [non-fixed length array] to a binary arrayBuffer [fixed-length array]
	const arrayBuffer = uint8Array_nonfixedLength.buffer;
	console.log("arrayBuffer:", arrayBuffer);

	// Determine the length of the typedArray_arrayBuffer
	console.log('arrayBuffer.byteLength: ', arrayBuffer.byteLength);
	
	return arrayBuffer;
}
